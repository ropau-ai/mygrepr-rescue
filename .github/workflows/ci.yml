name: CI/CD

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test-backend:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Install dependencies
              run: pip install -r requirements.txt

            - name: Run syntax check
              run: python -m py_compile backend/config.py backend/db/nocodb.py backend/processors/ai.py backend/fetchers/reddit.py scheduler.py

    build-frontend:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Install & Build
              working-directory: ./frontend
              env:
                  NOCODB_URL: http://localhost:8080
                  NOCODB_TABLE_ID: dummy_table_id
                  NOCODB_TOKEN: dummy_token
              run: |
                  npm install
                  npm run build

    deploy:
        runs-on: ubuntu-latest
        needs: [test-backend, build-frontend]
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        steps:
            - name: Deploy Frontend
              run: |
                  curl -s -X POST "${{ secrets.DOKPLOY_WEBHOOK_FRONTEND }}" \
                    -H "Content-Type: application/json" \
                    -H "x-github-event: push" \
                    -d '{"ref": "refs/heads/main"}' \
                    --max-time 120 || echo "Frontend webhook failed"
                  echo "Frontend deploy triggered"

            - name: Deploy Backend
              run: |
                  curl -s -X POST "${{ secrets.DOKPLOY_WEBHOOK_BACKEND }}" \
                    -H "Content-Type: application/json" \
                    -H "x-github-event: push" \
                    -d '{"ref": "refs/heads/main"}' \
                    --max-time 120 || echo "Backend webhook failed"
                  echo "Backend deploy triggered"
